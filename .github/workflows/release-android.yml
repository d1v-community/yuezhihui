name: Release Android

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "apps/flutter_app/**"
      - ".github/workflows/release-android.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-android:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo

    defaults:
      run:
        shell: bash
        working-directory: apps/flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve release version
        id: version
        run: |
          VERSION_NAME="$(date +'%Y.%m.%d')"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          TAG_NAME="android-v${VERSION_NAME}+${BUILD_NUMBER}"
          APK_NAME="flowcycle-android-${VERSION_NAME}+${BUILD_NUMBER}-release.apk"

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${APK_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android release APK
        run: |
          flutter build apk \
            --release \
            --dart-define=API_BASE_URL=https://www.yuezhihui.xyz \
            --build-name "${{ steps.version.outputs.version_name }}" \
            --build-number "${{ steps.version.outputs.build_number }}"

      - name: Rename APK for release
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
            "build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: apps/flutter_app/build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Android ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}
          generate_release_notes: true
          make_latest: true
          files: |
            apps/flutter_app/build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
